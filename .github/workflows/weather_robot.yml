name: Daily Weather Robot

on:
  schedule:
    # 每天北京时间 06:00 (UTC 22:00)
    - cron: '30 21 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Weather Robot
        env:
          HEFENG_API_KEY: ${{ secrets.HEFENG_API_KEY }}
          HEFENG_API_HOST: ${{ secrets.HEFENG_API_HOST }}
          WECOM_CORP_ID: ${{ secrets.WECOM_CORP_ID }}
          WECOM_AGENT_ID: ${{ secrets.WECOM_AGENT_ID }}
          WECOM_APP_SECRET: ${{ secrets.WECOM_APP_SECRET }}
          WECOM_TO_USER: ${{ secrets.WECOM_TO_USER }}
          WECOM_TOKEN: ${{ secrets.WECOM_TOKEN }}
          WECOM_ENCODING_AES_KEY: ${{ secrets.WECOM_ENCODING_AES_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CITY: ${{ secrets.CITY }}
        run: python run_once.py
